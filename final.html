<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Last Thing...</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="final-page">

  <div class="final-container">
    <p class="final-line">Maybe this was just a website for others…</p>
    <p class="final-line">But for me…</p>
    <p class="final-line">It was a way to say <span class="gold-text">thank you</span>.</p>
    <p class="final-line">For your <span class="gold-text">care</span>.</p>
    <p class="final-line">For your <span class="gold-text">patience</span>.</p>
    <p class="final-line">For being in my life.</p>
    <p class="final-line final-special">You are truly special, Renu Mishra ❤️</p>

    <p class="final-sign">— Your Dever, Swayam 💟</p>
<div class="buttons">
  <a href="message.html" class="btn">Leave a Message</a>
</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const finalLines = document.querySelectorAll(".final-line");
      const finalSign = document.querySelector(".final-sign");
      const finalBtn = document.querySelector(".final-btn");

      // Make sure body is visible
      document.body.style.opacity = "1";

      finalLines.forEach((line, index) => {
        setTimeout(() => {
          line.classList.add("show");
        }, index * 2200);
      });

      setTimeout(() => {
        if (finalSign) finalSign.classList.add("show");
      }, finalLines.length * 2200 + 800);

      setTimeout(() => {
        if (finalBtn) finalBtn.classList.add("show");
      }, finalLines.length * 2200 + 1800);
    });
  </script>

</body>
</html>
